<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}ShopWise{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 50: '#eef2ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' }
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .line-clamp-3 {
        display: -webkit-box;
        -webkit-line-clamp: 3;
        line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
    }
  </style>
</head>
<body class="min-h-screen bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-100 transition-colors duration-200">

  <!-- Navbar -->
  <nav class="sticky top-0 z-50 bg-white/80 dark:bg-gray-950/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16">
      <a href="/" class="flex items-center gap-2 font-extrabold text-xl text-indigo-600 dark:text-indigo-400 tracking-tight">
        🛍️ ShopWise
      </a>
      <div class="flex items-center gap-1">
        <button id="darkToggle" title="Toggle dark mode"
          class="p-2 rounded-full text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-gray-100 hover:bg-gray-100 dark:hover:bg-gray-800 transition">
          <span id="darkIcon">🌙</span>
        </button>
        <a href="/admin"
          class="text-sm font-medium px-3 py-1.5 rounded-lg text-gray-600 dark:text-gray-400 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-950/30 transition">
          Admin
        </a>
        <!-- Cart button -->
        <button id="cartBtn" title="Shopping cart"
          class="relative p-2 ml-1 rounded-full text-gray-600 hover:text-gray-900 dark:text-gray-400 dark:hover:text-gray-100 hover:bg-gray-100 dark:hover:bg-gray-800 transition">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
          </svg>
          <span id="cartCount"
            class="hidden absolute -top-0.5 -right-0.5 bg-indigo-600 text-white text-xs font-bold w-5 h-5 rounded-full flex items-center justify-center">
            0
          </span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="mt-16 py-8 border-t border-gray-200 dark:border-gray-800 text-center text-sm text-gray-400 dark:text-gray-600">
    © 2025 ShopWise — AI-Powered Shopping
  </footer>

  <!-- ── Cart Drawer ──────────────────────────────────────────────────────── -->

  <!-- Backdrop -->
  <div id="cartBackdrop"
    class="hidden fixed inset-0 bg-black/40 z-40 transition-opacity duration-300"
    onclick="closeCart()">
  </div>

  <!-- Drawer panel -->
  <div id="cartDrawer"
    class="fixed top-0 right-0 h-full w-full max-w-sm bg-white dark:bg-gray-900
           shadow-2xl z-50 flex flex-col transform translate-x-full transition-transform duration-300 ease-in-out">

    <!-- Header -->
    <div class="flex items-center justify-between px-5 py-4 border-b border-gray-200 dark:border-gray-700">
      <h2 class="text-lg font-bold text-gray-900 dark:text-gray-100">Your Cart</h2>
      <button onclick="closeCart()"
        class="p-2 rounded-full text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-gray-100 hover:bg-gray-100 dark:hover:bg-gray-800 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Items -->
    <div id="cartItems" class="flex-1 overflow-y-auto px-5 py-4 space-y-4">
      <!-- populated by renderCart() -->
    </div>

    <!-- Empty state -->
    <div id="cartEmpty" class="hidden flex-1 flex flex-col items-center justify-center text-center px-8">
      <div class="text-5xl mb-4">🛒</div>
      <p class="text-gray-500 dark:text-gray-400 font-medium">Your cart is empty</p>
      <p class="text-sm text-gray-400 dark:text-gray-500 mt-1">Add some products to get started</p>
    </div>

    <!-- Footer -->
    <div id="cartFooter" class="border-t border-gray-200 dark:border-gray-700 px-5 py-4 space-y-3">
      <div class="flex items-center justify-between text-sm">
        <span class="text-gray-500 dark:text-gray-400">Subtotal</span>
        <span id="cartSubtotal" class="font-bold text-gray-900 dark:text-gray-100">$0.00</span>
      </div>
      <div class="flex items-center gap-2 text-xs text-gray-400 dark:text-gray-500">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
        Secure checkout · Free returns
      </div>
      <a href="/checkout"
        class="block w-full py-3 bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-semibold rounded-xl text-center transition-colors duration-150">
        Proceed to Checkout
      </a>
    </div>
  </div>

  <!-- ── Global Scripts ───────────────────────────────────────────────────── -->
  <script>
    // ── Dark mode ───────────────────────────────────────────────────────────
    const darkToggle = document.getElementById('darkToggle');
    const darkIcon   = document.getElementById('darkIcon');
    const html       = document.documentElement;

    if (localStorage.getItem('theme') === 'dark') {
      html.classList.add('dark');
      darkIcon.textContent = '☀️';
    }

    darkToggle.addEventListener('click', () => {
      html.classList.toggle('dark');
      const isDark = html.classList.contains('dark');
      darkIcon.textContent = isDark ? '☀️' : '🌙';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    // ── Cart helpers ────────────────────────────────────────────────────────
    function getCart() {
      try { return JSON.parse(localStorage.getItem('sw_cart') || '{"items":[]}'); }
      catch { return { items: [] }; }
    }

    function saveCart(cart) {
      localStorage.setItem('sw_cart', JSON.stringify(cart));
      refreshCartBadge();
      renderCart();
    }

    function refreshCartBadge() {
      const cart  = getCart();
      const total = cart.items.reduce((s, i) => s + i.quantity, 0);
      const badge = document.getElementById('cartCount');
      badge.textContent = total;
      badge.classList.toggle('hidden', total === 0);
    }

    function addToCart(product) {
      const cart = getCart();
      const existing = cart.items.find(i => i.id === product.id);
      if (existing) {
        existing.quantity += 1;
      } else {
        cart.items.push({
          id:        product.id,
          name:      product.name,
          price:     Number(product.price),
          image_url: product.image_url || '',
          quantity:  1,
        });
      }
      saveCart(cart);
      openCart();
    }

    function removeFromCart(id) {
      const cart = getCart();
      cart.items = cart.items.filter(i => i.id !== id);
      saveCart(cart);
    }

    function updateQuantity(id, delta) {
      const cart = getCart();
      const item = cart.items.find(i => i.id === id);
      if (!item) return;
      item.quantity = Math.max(1, item.quantity + delta);
      saveCart(cart);
    }

    function clearCart() {
      saveCart({ items: [] });
    }

    function openCart() {
      document.getElementById('cartBackdrop').classList.remove('hidden');
      setTimeout(() => {
        document.getElementById('cartDrawer').classList.remove('translate-x-full');
      }, 10);
      renderCart();
    }

    function closeCart() {
      document.getElementById('cartDrawer').classList.add('translate-x-full');
      setTimeout(() => {
        document.getElementById('cartBackdrop').classList.add('hidden');
      }, 300);
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = String(str ?? '');
      return d.innerHTML;
    }

    function fmtPrice(n) {
      return '$' + Number(n).toFixed(2);
    }

    function renderCart() {
      const cart      = getCart();
      const container = document.getElementById('cartItems');
      const empty     = document.getElementById('cartEmpty');
      const footer    = document.getElementById('cartFooter');

      if (cart.items.length === 0) {
        container.classList.add('hidden');
        empty.classList.remove('hidden');
        footer.classList.add('hidden');
        return;
      }

      container.classList.remove('hidden');
      empty.classList.add('hidden');
      footer.classList.remove('hidden');

      const fallback = 'https://placehold.co/80x80/e0e7ff/6366f1?text=Item';
      container.innerHTML = cart.items.map(item => `
        <div class="flex gap-3 items-start">
          <img
            src="${esc(item.image_url)}"
            onerror="this.onerror=null;this.src='${fallback}'"
            alt="${esc(item.name)}"
            class="w-16 h-16 rounded-lg object-cover bg-gray-100 dark:bg-gray-800 shrink-0"
          />
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-gray-900 dark:text-gray-100 line-clamp-2">${esc(item.name)}</p>
            <p class="text-sm font-bold text-indigo-600 dark:text-indigo-400 mt-0.5">${fmtPrice(item.price)}</p>
            <div class="flex items-center gap-2 mt-2">
              <button onclick="updateQuantity('${esc(item.id)}', -1)"
                class="w-7 h-7 rounded-full bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 flex items-center justify-center text-gray-600 dark:text-gray-300 text-lg font-bold transition">−</button>
              <span class="text-sm font-semibold text-gray-900 dark:text-gray-100 w-4 text-center">${item.quantity}</span>
              <button onclick="updateQuantity('${esc(item.id)}', 1)"
                class="w-7 h-7 rounded-full bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 flex items-center justify-center text-gray-600 dark:text-gray-300 text-lg font-bold transition">+</button>
              <button onclick="removeFromCart('${esc(item.id)}')"
                class="ml-auto text-gray-400 hover:text-red-500 dark:text-gray-500 dark:hover:text-red-400 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      `).join('<hr class="border-gray-100 dark:border-gray-800">');

      const subtotal = cart.items.reduce((s, i) => s + i.price * i.quantity, 0);
      document.getElementById('cartSubtotal').textContent = fmtPrice(subtotal);
    }

    // ── Init ────────────────────────────────────────────────────────────────
    document.getElementById('cartBtn').addEventListener('click', openCart);
    refreshCartBadge();
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
